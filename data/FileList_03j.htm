<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebook Library Catalog</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f4f7f6;
      --card-bg: #ffffff;
      --primary: #2d3436;
      --secondary: #636e72;
      --accent: #0984e3;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --overlay: rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--primary);
      margin: 0 auto;
      padding: 10px 0;
      max-width: 90%;
      width: 1600px;
    }

    h1.pageTitle {
      font-weight: 300;
      margin: 0;
    }

    header {
      max-width: 1400px;
      margin: 0 auto 20px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #dfe6e9;
      padding-bottom: 15px;
    }

    .stats {
      font-size: 0.9rem;
      color: var(--secondary);
      background: #dfe6e9;
      padding: 4px 12px;
      border-radius: 4px;
    }

    /* Controls Bar */
    .controls-bar {
      max-width: 1400px;
      margin: 10px auto 20px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .breadcrumb {
      font-size: 16px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }

    .back-btn:hover {
      text-decoration: underline;
    }

    .sort-container select {
      padding: 6px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background-color: white;
      color: var(--primary);
      cursor: pointer;
      outline: none;
    }

    .sort-container select:focus {
      border-color: var(--accent);
    }

    /* Layout Structure for Sidebar + Main Content Container */
    .app-layout {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      gap: 25px;
      align-items: flex-start;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 20px;
    }

    .sidebar h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }

    .filter-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-item {
      padding: 8px 12px;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      color: var(--secondary);
      transition: background 0.2s, color 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .filter-item:hover {
      background: #f0f4f8;
      color: var(--accent);
    }

    .filter-item.active {
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
    }

    .filter-count-badge {
      font-size: 0.75rem;
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 6px;
      border-radius: 10px;
    }

    .filter-item.active .filter-count-badge {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    /* Content Area Layout */
    .content-area {
      flex-grow: 1;
      width: 100%;
    }

    /* Section Headings */
    .parent-group {
      margin: 0 auto 40px auto;
    }

    .parent-title {
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--primary);
      border-bottom: 1px solid #cbd5e1;
      padding-bottom: 8px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Folder Grid */
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .folder-card {
      background: var(--card-bg);
      padding: 10px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
      gap: 15px;
      min-height: 80px;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .folder-card:hover {
      transform: translateY(-1px);
      background-color: #fcfcfc;
    }

    .folder-icon {
      font-size: 16px;
    }

    .folder-info {
      padding-right: 35px;
    }

    .folder-info h3 {
      margin: 0 0 4px 0;
      color: #6d9eac;
      font-weight: 400;
      font-size: 20px;
    }

    /* Absolutely Positioned Folder Count Badge */
    .folder-count {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 22px;
      font-weight: 300;
      color: #dddddd;
      padding: 2px 7px;
      border-radius: 4px;
      transition: all 0.6s ease-in;
    }

    .folder-card:hover .folder-count {
      color: #5f5f5f;
      font-weight: 500;
    }

    /* Books Grid */
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
    }

    .book-card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      transform: translateY(-2px);
    }

    .cover-box {
      position: relative;
      width: 100%;
      padding-top: 140%;
      background: #e2e2e2;
    }

    .cover-box img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 450px;
      height: 100%;
      object-fit: cover;
    }

    .details {
      padding: 12px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      margin-top: auto;
      font-size: 0.7rem;
      color: var(--secondary);
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #eee;
      padding-top: 8px;
      align-items: center;
    }

    .format-icon {
      height: 18px;
      width: auto;
      object-fit: contain;
      display: inline-block;
      vertical-align: middle;
    }

    .modal-format-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .format-badge {
      background: var(--accent);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      font-size: 0.6rem;
    }

    .rating-badge {
      color: #f1c40f;
      font-weight: bold;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 1200px;
      width: 90%;
      height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      position: relative;
      display: flex;
      gap: 20px;
    }

    @media (max-width: 800px) {
      .app-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        position: relative;
        top: 0;
      }

      .modal-content {
        flex-direction: column;
      }
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #dfe6e9;
      border: none;
      font-size: 1.2rem;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: #b2bec3;
    }

    .modal-left {
      flex: 1;
    }

    .modal-left img {
      border-radius: 6px;
      box-shadow: var(--shadow);
      max-height: 100%;
      max-width: 500px;
    }

    @media only screen and (max-width: 600px) {
      .modal-left img {
        max-width: 80vw;
      }
    }

    .modal-right {
      flex: 2;
    }

    .modal-title {
      margin: 0 0 15px 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .info-table tr {
      border-bottom: 1px solid #f1f1f1;
    }

    .info-table td {
      padding: 8px 4px;
    }

    .info-table td.label {
      color: var(--secondary);
      font-weight: 600;
      width: 35%;
    }
  </style>
</head>

<body>

  <header>
    <h1 class="pageTitle">Ebooks Catalog</h1>
    <div id="book-count" class="stats">Loading Library...</div>
  </header>

  <div class="controls-bar">
    <div class="breadcrumb" id="nav-breadcrumb">
      <span>📁 Home</span>
    </div>
    <div class="sort-container">
      <select id="sort-select">
      </select>
    </div>
  </div>

  <div class="app-layout">
    <aside class="sidebar">
      <h3>Series Keywords</h3>
      <ul class="filter-list" id="series-filter-list">
      </ul>
    </aside>

    <main id="view-container" class="content-area"></main>
  </div>

  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="close-btn">&times;</button>
      <div class="modal-left">
        <img id="modal-img" src="" alt="Book Cover">
      </div>
      <div class="modal-right">
        <h2 id="modal-title" class="modal-title">Book Title</h2>
        <table class="info-table">
          <tbody>
            <tr>
              <td class="label">ID</td>
              <td id="info-id">-</td>
            </tr>
            <tr>
              <td class="label">Format</td>
              <td id="info-format">-</td>
            </tr>
            <tr>
              <td class="label">File Size</td>
              <td id="info-size">-</td>
            </tr>
            <tr>
              <td class="label">Relative Path</td>
              <td id="info-path">-</td>
            </tr>
            <tr>
              <td class="label">Rating</td>
              <td id="info-rating">-</td>
            </tr>
            <tr>
              <td class="label">Date Created</td>
              <td id="info-created">-</td>
            </tr>
            <tr>
              <td class="label">Last Modified</td>
              <td id="info-modified">-</td>
            </tr>
            <tr>
              <td class="label">Status</td>
              <td id="info-status">-</td>
            </tr>
            <tr>
              <td class="label">Notes</td>
              <td id="info-notes">-</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // --- HARDCODED SERIES KEYWORDS LIST ---
    const hardcodedSeriesKeywords = ['Dummies', "O'Reilly", 'Packt', 'Head First'];

    let libraryBooks = [];
    let nestedLibraryStructure = {};

    let currentView = 'dashboard';
    let currentActiveParent = '';
    let currentActiveSub = '';
    let selectedSeriesFilter = ''; // Tracks the active series filter

    // --- High-Precision Relative Time Logic ---
    function getRelativeTimeString(dateString) {
      if (!dateString) return '-';
      const inputDate = new Date(dateString);
      if (isNaN(inputDate.getTime())) return '-';

      const now = new Date();
      const diffMs = now.getTime() - inputDate.getTime();

      if (diffMs < 0) return "Today";

      const diffMinutes = Math.floor(diffMs / (1000 * 60));
      const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (diffMinutes < 1) {
        return "Just now";
      }
      if (diffMinutes < 60) {
        return diffMinutes === 1 ? "1 minute back" : `${diffMinutes} minutes back`;
      }
      if (diffHours < 24) {
        return diffHours === 1 ? "1 hour back" : `${diffHours} hours back`;
      }
      if (diffDays === 1) {
        return "Yesterday";
      }
      if (diffDays < 7) {
        return `${diffDays} days back`;
      }

      const diffWeeks = Math.floor(diffDays / 7);
      if (diffWeeks >= 1 && diffWeeks <= 3) {
        return diffWeeks === 1 ? "1 week back" : `${diffWeeks} weeks back`;
      }

      const diffMonths = Math.floor(diffDays / 30.4368);
      if (diffDays < 365) {
        return diffMonths <= 1 ? "1 month back" : `${diffMonths} months back`;
      }

      const diffYears = Math.floor(diffDays / 365.2425);
      return diffYears <= 1 ? "1 year back" : `${diffYears} years back`;
    }

    function parseFolderStructure(filepath) {
      if (!filepath) return { parent: "Unsorted", sub: "Root" };
      const cleanPath = filepath.replace(/\\/g, '/');
      const parts = cleanPath.split('/');

      if (parts[0] === 'ebooks') parts.shift();
      if (parts.length > 1) parts.pop();

      if (parts.length >= 2) {
        return { parent: parts[0], sub: parts.slice(1).join(' / ') };
      } else if (parts.length === 1 && parts[0] !== "") {
        return { parent: parts[0], sub: "Main Folder" };
      }
      return { parent: "Unsorted", sub: "Root" };
    }

    async function initLibrary() {
      const countLabel = document.getElementById('book-count');
      const modal = document.getElementById('detail-modal');
      const closeBtn = document.getElementById('close-btn');
      const sortSelect = document.getElementById('sort-select');

      try {
        const response = await fetch('catalog.json');
        libraryBooks = await response.json();
        countLabel.textContent = `${libraryBooks.length} Books`;

        // Build base folder structure tree
        rebuildNestedStructure();

        sortSelect.addEventListener('change', handleSortChange);

        // Render sidebar items and land on directory view
        renderSidebarFilters();
        renderFolderDashboard();

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => {
          if (e.target === modal) modal.classList.remove('active');
        });

      } catch (err) {
        console.error("Initialization Failed:", err);
        document.getElementById('view-container').innerHTML = `<p>Error fetching data resources.</p>`;
      }
    }

    function rebuildNestedStructure() {
      nestedLibraryStructure = {};
      libraryBooks.forEach(book => {
        const location = parseFolderStructure(book.filepath);
        if (!nestedLibraryStructure[location.parent]) nestedLibraryStructure[location.parent] = {};
        if (!nestedLibraryStructure[location.parent][location.sub]) nestedLibraryStructure[location.parent][location.sub] = [];
        nestedLibraryStructure[location.parent][location.sub].push(book);
      });
    }

    function renderSidebarFilters() {
      const filterListContainer = document.getElementById('series-filter-list');
      filterListContainer.innerHTML = '';

      // All Ebooks tab indicator
      const allLi = document.createElement('li');
      allLi.className = `filter-item ${selectedSeriesFilter === '' ? 'active' : ''}`;
      allLi.innerHTML = `<span>All Ebooks</span> <span class="filter-count-badge">${libraryBooks.length}</span>`;
      allLi.addEventListener('click', () => selectSeriesCriteria(''));
      filterListContainer.appendChild(allLi);

      // Loop over hardcoded string array
      hardcodedSeriesKeywords.forEach(seriesName => {
        const matchCount = libraryBooks.filter(book =>
          book.series && book.series.toLowerCase().includes(seriesName.toLowerCase())
        ).length;

        const li = document.createElement('li');
        li.className = `filter-item ${selectedSeriesFilter === seriesName ? 'active' : ''}`;
        li.innerHTML = `<span>${seriesName}</span> <span class="filter-count-badge">${matchCount}</span>`;
        li.addEventListener('click', () => selectSeriesCriteria(seriesName));
        filterListContainer.appendChild(li);
      });
    }

    // Handles keyword selection clicks
    function selectSeriesCriteria(seriesName) {
      selectedSeriesFilter = seriesName;
      renderSidebarFilters();

      if (seriesName === '') {
        // If empty string, reset filter and show folder hierarchy
        rebuildNestedStructure();
        renderFolderDashboard();
      } else {
        // Direct flat book card presentation
        renderSeriesFlatView(seriesName);
      }
    }

    function updateSortOptions() {
      const sortSelect = document.getElementById('sort-select');
      sortSelect.innerHTML = '';

      if (currentView === 'dashboard' || currentView === 'parent') {
        sortSelect.innerHTML = `
          <option value="name-asc">Folders: A-Z</option>
          <option value="name-desc">Folders: Z-A</option>
        `;
      } else {
        sortSelect.innerHTML = `
          <option value="title-asc">Name: Alphabetical (A-Z)</option>
          <option value="title-desc">Name: Reverse (Z-A)</option>
          <option value="size-desc">File Size: Large to Small</option>
          <option value="size-asc">File Size: Small to Large</option>
          <option value="date-desc">Date: Newest Added</option>
          <option value="rating-desc">Rating: Highest Rated</option>
        `;
      }
    }

    function handleSortChange(e) {
      const criteria = e.target.value;
      if (currentView === 'dashboard') {
        renderFolderDashboard(criteria);
      } else if (currentView === 'parent') {
        renderParentGroup(currentActiveParent, criteria);
      } else if (currentView === 'shelf') {
        renderBookShelf(currentActiveParent, currentActiveSub, criteria);
      } else if (currentView === 'series-flat') {
        renderSeriesFlatView(selectedSeriesFilter, criteria);
      }
    }

    // Displays matching results directly as a flat layout view
    function renderSeriesFlatView(seriesName, sortOrder = 'title-asc') {
      currentView = 'series-flat';
      updateSortOptions();
      document.getElementById('sort-select').value = sortOrder;

      const container = document.getElementById('view-container');
      const breadcrumb = document.getElementById('nav-breadcrumb');

      // Filter matches dynamically
      let books = libraryBooks.filter(book =>
        book.series && book.series.toLowerCase().includes(seriesName.toLowerCase())
      );

      // Perform book sort criteria operations
      books.sort((a, b) => {
        const titleA = a.filename ? a.filename.toLowerCase() : '';
        const titleB = b.filename ? b.filename.toLowerCase() : '';

        switch (sortOrder) {
          case 'title-asc': return titleA.localeCompare(titleB);
          case 'title-desc': return titleB.localeCompare(titleA);
          case 'size-desc': return b.filesize - a.filesize;
          case 'size-asc': return a.filesize - b.filesize;
          case 'date-desc': return new Date(b.createdAt) - new Date(a.createdAt);
          case 'rating-desc': return (b.rating || 0) - (a.rating || 0);
          default: return 0;
        }
      });

      breadcrumb.innerHTML = `
        <span class="back-btn" onclick="selectSeriesCriteria('')">📁 Home</span> 
        <span> &gt; </span> 
        <span>Series: ${seriesName}</span>
      `;

      container.innerHTML = '';
      if (books.length === 0) {
        container.innerHTML = `<p style="padding: 20px; color: var(--secondary);">No books match this series keyword filter.</p>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'catalog-grid';

      books.forEach(book => {
        const safeFilename = book.filename || "Unknown_Title.pdf";
        const displayTitle = safeFilename.replace(/\.[^/.]+$/, "");
        const normalizedCover = book.coverImage ? book.coverImage.replace(/\\/g, '/') : '';
        const fixedCoverPath = normalizedCover ? `../${normalizedCover}` : `../covers/placeholder.jpg`;

        const ratingStars = book.rating ? `⭐ ${book.rating}` : '';

        let formatDisplayHTML = '';
        const lowerFormat = book.format ? book.format.toLowerCase() : '';

        if (lowerFormat === 'pdf') {
          formatDisplayHTML = `<img src="img/icon_pdf.svg" alt="PDF" class="format-icon">`;
        } else if (lowerFormat === 'epub') {
          formatDisplayHTML = `<img src="img/icon_epub.svg" alt="EPUB" class="format-icon">`;
        } else {
          formatDisplayHTML = `<span class="format-badge">${book.format || 'UNKNOWN'}</span>`;
        }

        const safeSize = book.filesizeMB !== undefined ? `${book.filesizeMB} MB` : '0 MB';

        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
          <div class="cover-box">
            <img src="${fixedCoverPath}" alt="Cover" loading="lazy">
          </div>
          <div class="details">
            <div class="title" title="${displayTitle}">${displayTitle}</div>
            <div class="meta">
              ${formatDisplayHTML}
              <span class="rating-badge">${ratingStars}</span>
              <span>${safeSize}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', () => showDetails(book));
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    function renderFolderDashboard(sortOrder = 'name-asc') {
      currentView = 'dashboard';
      updateSortOptions();
      document.getElementById('sort-select').value = sortOrder;

      const container = document.getElementById('view-container');
      const breadcrumb = document.getElementById('nav-breadcrumb');

      breadcrumb.innerHTML = `<span>📁 Home</span>`;
      container.innerHTML = '';

      const masterFragment = document.createDocumentFragment();
      let sortedParents = Object.keys(nestedLibraryStructure).sort();

      if (sortOrder === 'name-desc') sortedParents.reverse();

      sortedParents.forEach(parentName => {
        const parentSection = document.createElement('div');
        parentSection.className = 'parent-group';

        const parentHeader = document.createElement('h2');
        parentHeader.className = 'parent-title back-btn';
        parentHeader.textContent = parentName;
        parentHeader.addEventListener('click', () => renderParentGroup(parentName));
        parentSection.appendChild(parentHeader);

        const folderGrid = document.createElement('div');
        folderGrid.className = 'folder-grid';

        let sortedSubs = Object.keys(nestedLibraryStructure[parentName]).sort();
        if (sortOrder === 'name-desc') sortedSubs.reverse();

        sortedSubs.forEach(subName => {
          const bookCount = nestedLibraryStructure[parentName][subName].length;

          const folderCard = document.createElement('div');
          folderCard.className = 'folder-card';
          folderCard.innerHTML = `
            <div class="folder-info">
              <h3>${subName}</h3>
            </div>
            <div class="folder-count">${bookCount}</div>
          `;

          folderCard.addEventListener('click', () => renderBookShelf(parentName, subName));
          folderGrid.appendChild(folderCard);
        });

        parentSection.appendChild(folderGrid);
        masterFragment.appendChild(parentSection);
      });

      container.appendChild(masterFragment);
    }

    function renderParentGroup(parentName, sortOrder = 'name-asc') {
      currentView = 'parent';
      currentActiveParent = parentName;
      updateSortOptions();
      document.getElementById('sort-select').value = sortOrder;

      const container = document.getElementById('view-container');
      const breadcrumb = document.getElementById('nav-breadcrumb');

      breadcrumb.innerHTML = `
        <span class="back-btn" onclick="selectSeriesCriteria('')">📁 Home</span> 
        <span> &gt; </span> 
        <span>${parentName}</span>
      `;
      container.innerHTML = '';

      const parentSection = document.createElement('div');
      parentSection.className = 'parent-group';

      const parentHeader = document.createElement('h2');
      parentHeader.className = 'parent-title';
      parentHeader.textContent = parentName;
      parentSection.appendChild(parentHeader);

      const folderGrid = document.createElement('div');
      folderGrid.className = 'folder-grid';

      let sortedSubs = Object.keys(nestedLibraryStructure[parentName]).sort();
      if (sortOrder === 'name-desc') sortedSubs.reverse();

      sortedSubs.forEach(subName => {
        const bookCount = nestedLibraryStructure[parentName][subName].length;

        const folderCard = document.createElement('div');
        folderCard.className = 'folder-card';
        folderCard.innerHTML = `
          <div class="folder-info">
            <h3>${subName}</h3>
          </div>
          <div class="folder-count">${bookCount}</div>
        `;

        folderCard.addEventListener('click', () => renderBookShelf(parentName, subName));
        folderGrid.appendChild(folderCard);
      });

      parentSection.appendChild(folderGrid);
      container.appendChild(parentSection);
    }

    function renderBookShelf(parentName, subName, sortOrder = 'title-asc') {
      currentView = 'shelf';
      currentActiveParent = parentName;
      currentActiveSub = subName;

      updateSortOptions();
      document.getElementById('sort-select').value = sortOrder;

      const container = document.getElementById('view-container');
      const breadcrumb = document.getElementById('nav-breadcrumb');

      let books = [...nestedLibraryStructure[parentName][subName]];

      books.sort((a, b) => {
        const titleA = a.filename ? a.filename.toLowerCase() : '';
        const titleB = b.filename ? b.filename.toLowerCase() : '';

        switch (sortOrder) {
          case 'title-asc': return titleA.localeCompare(titleB);
          case 'title-desc': return titleB.localeCompare(titleA);
          case 'size-desc': return b.filesize - a.filesize;
          case 'size-asc': return a.filesize - b.filesize;
          case 'date-desc': return new Date(b.createdAt) - new Date(a.createdAt);
          case 'rating-desc': return (b.rating || 0) - (a.rating || 0);
          default: return 0;
        }
      });

      breadcrumb.innerHTML = `
        <span class="back-btn" onclick="selectSeriesCriteria('')">📁 Home</span> 
        <span> &gt; </span> 
        <span class="back-btn" onclick="renderParentGroup('${parentName.replace(/'/g, "\\'")}')">${parentName}</span>
        <span> &gt; </span> 
        <span> ${subName}</span>
      `;

      container.innerHTML = '';
      const grid = document.createElement('div');
      grid.className = 'catalog-grid';

      books.forEach(book => {
        const safeFilename = book.filename || "Unknown_Title.pdf";
        const displayTitle = safeFilename.replace(/\.[^/.]+$/, "");
        const normalizedCover = book.coverImage ? book.coverImage.replace(/\\/g, '/') : '';
        const fixedCoverPath = normalizedCover ? `../${normalizedCover}` : `../covers/placeholder.jpg`;

        const ratingStars = book.rating ? `⭐ ${book.rating}` : '';

        let formatDisplayHTML = '';
        const lowerFormat = book.format ? book.format.toLowerCase() : '';

        if (lowerFormat === 'pdf') {
          formatDisplayHTML = `<img src="img/icon_pdf.svg" alt="PDF" class="format-icon">`;
        } else if (lowerFormat === 'epub') {
          formatDisplayHTML = `<img src="img/icon_epub.svg" alt="EPUB" class="format-icon">`;
        } else {
          formatDisplayHTML = `<span class="format-badge">${book.format || 'UNKNOWN'}</span>`;
        }

        const safeSize = book.filesizeMB !== undefined ? `${book.filesizeMB} MB` : '0 MB';

        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
          <div class="cover-box">
            <img src="${fixedCoverPath}" alt="Cover" loading="lazy">
          </div>
          <div class="details">
            <div class="title" title="${displayTitle}">${displayTitle}</div>
            <div class="meta">
              ${formatDisplayHTML}
              <span class="rating-badge">${ratingStars}</span>
              <span>${safeSize}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', () => showDetails(book));
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    function showDetails(book) {
      const modal = document.getElementById('detail-modal');
      const safeFilename = book.filename || "Unknown_Title.pdf";
      const cleanTitle = safeFilename.replace(/\.[^/.]+$/, "");
      const normalizedCover = book.coverImage ? book.coverImage.replace(/\\/g, '/') : '';

      document.getElementById('modal-title').textContent = cleanTitle;
      document.getElementById('modal-img').src = normalizedCover ? `../${normalizedCover}` : `../covers/placeholder.jpg`;

      document.getElementById('info-id').textContent = book.id || '-';

      const formatCell = document.getElementById('info-format');
      const lowerFormat = book.format ? book.format.toLowerCase() : '';
      const textLabel = book.format ? book.format.toUpperCase() : 'UNKNOWN';

      if (lowerFormat === 'pdf') {
        formatCell.innerHTML = `
          <div class="modal-format-wrapper">
            <img src="img/icon_pdf.svg" alt="PDF" class="format-icon">
            <span>${textLabel}</span>
          </div>`;
      } else if (lowerFormat === 'epub') {
        formatCell.innerHTML = `
          <div class="modal-format-wrapper">
            <img src="img/icon_epub.svg" alt="EPUB" class="format-icon">
            <span>${textLabel}</span>
          </div>`;
      } else {
        formatCell.textContent = textLabel;
      }

      const safeSizeMB = book.filesizeMB !== undefined ? book.filesizeMB : '0';
      const safeBytes = book.filesize !== undefined ? book.filesize.toLocaleString() : '0';
      document.getElementById('info-size').textContent = `${safeSizeMB} MB (${safeBytes} bytes)`;

      document.getElementById('info-path').textContent = book.filepath ? book.filepath.replace(/\\/g, '/') : '-';
      document.getElementById('info-rating').textContent = book.rating ? `⭐ ${book.rating} / 5` : "Unrated";

      document.getElementById('info-created').textContent = getRelativeTimeString(book.createdAt);
      document.getElementById('info-modified').textContent = getRelativeTimeString(book.modifiedAt);

      document.getElementById('info-status').textContent = book.status || '-';
      document.getElementById('info-notes').textContent = book.notes || "None";

      modal.classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', initLibrary);
  </script>
</body>

</html>
