<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebook Library Catalog</title>
  <style>
    :root {
      --bg: #f4f7f6;
      --card-bg: #ffffff;
      --primary: #2d3436;
      --secondary: #636e72;
      --accent: #0984e3;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --overlay: rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--primary);
      margin: 0;
      padding: 20px;
    }

    header {
      max-width: 1400px;
      margin: 0 auto 10px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #dfe6e9;
      padding-bottom: 10px;
    }

    .stats {
      font-size: 0.9rem;
      color: var(--secondary);
      background: #dfe6e9;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* Folder Section Styling */
    .folder-section {
      max-width: 1400px;
      margin: 30px auto;
    }

    .folder-header {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      background: #e4ebe9;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .folder-header::before {
      content: "📁";
      font-size: 1.2rem;
    }

    .folder-count {
      font-size: 0.85rem;
      color: var(--secondary);
      font-weight: normal;
    }

    /* Grid Layout */
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
      margin-bottom: 10px;
    }

    /* Card Design */
    .book-card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      transform: translateY(-5px);
    }

    .cover-box {
      position: relative;
      width: 100%;
      padding-top: 140%;
      background: #e2e2e2;
    }

    .cover-box img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .details {
      padding: 12px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      margin-top: auto;
      font-size: 0.7rem;
      color: var(--secondary);
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    .format-badge {
      background: var(--accent);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      font-size: 0.6rem;
    }

    /* --- Modal Window Overlay --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      display: flex;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .modal-content {
        flex-direction: column;
      }
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #dfe6e9;
      border: none;
      font-size: 1.2rem;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: #b2bec3;
    }

    .modal-left {
      flex: 1;
      max-width: 180px;
    }

    .modal-left img {
      width: 100%;
      border-radius: 6px;
      box-shadow: var(--shadow);
    }

    .modal-right {
      flex: 2;
    }

    .modal-title {
      margin: 0 0 15px 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .info-table tr {
      border-bottom: 1px solid #f1f1f1;
    }

    .info-table td {
      padding: 8px 4px;
    }

    .info-table td.label {
      color: var(--secondary);
      font-weight: 600;
      width: 35%;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ebook Catalog</h1>
    <div id="book-count" class="stats">Loading Library...</div>
  </header>

  <main id="library-container"></main>

  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="close-btn">&times;</button>

      <div class="modal-left">
        <img id="modal-img" src="" alt="Book Cover">
      </div>

      <div class="modal-right">
        <h2 id="modal-title" class="modal-title">Book Title</h2>
        <table class="info-table">
          <tbody>
            <tr><td class="label">ID</td><td id="info-id">-</td></tr>
            <tr><td class="label">Format</td><td id="info-format">-</td></tr>
            <tr><td class="label">File Size</td><td id="info-size">-</td></tr>
            <tr><td class="label">Relative Path</td><td id="info-path">-</td></tr>
            <tr><td class="label">Date Created</td><td id="info-created">-</td></tr>
            <tr><td class="label">Last Modified</td><td id="info-modified">-</td></tr>
            <tr><td class="label">Status</td><td id="info-status">-</td></tr>
            <tr><td class="label">Notes</td><td id="info-notes">-</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let libraryBooks = [];

    // Safely extracts the folder path by normalizing all slash types first
    function getFolderName(filepath) {
      if (!filepath) return "Unsorted";

      // CRITICAL FIX: Convert Windows backslashes (\) to standard forward slashes (/)
      const cleanPath = filepath.replace(/\\/g, '/');
      const parts = cleanPath.split('/');

      // Strip 'ebooks' folder prefix if present
      if (parts[0] === 'ebooks') {
        parts.shift();
      }

      // Remove filename from processing string
      if (parts.length > 1) {
        parts.pop();
      }

      return parts.join(' / ') || "Root Folder";
    }

    async function initGallery() {
      const container = document.getElementById('library-container');
      const countLabel = document.getElementById('book-count');
      const modal = document.getElementById('detail-modal');
      const closeBtn = document.getElementById('close-btn');

      try {
        const response = await fetch('catalog.json');
        libraryBooks = await response.json();

        countLabel.textContent = `${libraryBooks.length} Books`;

        // 1. Group books by directory structure
        const groups = {};
        libraryBooks.forEach(book => {
          const folderGroup = getFolderName(book.filepath);
          if (!groups[folderGroup]) {
            groups[folderGroup] = [];
          }
          groups[folderGroup].push(book);
        });

        const sortedFolders = Object.keys(groups).sort();
        const masterFragment = document.createDocumentFragment();

        sortedFolders.forEach(folderName => {
          const booksInFolder = groups[folderName];

          const section = document.createElement('section');
          section.className = 'folder-section';

          const header = document.createElement('div');
          header.className = 'folder-header';
          header.innerHTML = `${folderName} <span class="folder-count">(${booksInFolder.length} books)</span>`;
          section.appendChild(header);

          const grid = document.createElement('div');
          grid.className = 'catalog-grid';

          booksInFolder.forEach(book => {
            const displayTitle = book.filename.replace(/\.[^/.]+$/, "");

            // Clean up backslashes in cover path image strings as well
            const normalizedCover = book.coverImage ? book.coverImage.replace(/\\/g, '/') : '';
            const fixedCoverPath = normalizedCover ? `../${normalizedCover}` : `../covers/placeholder.jpg`;

            const card = document.createElement('div');
            card.className = 'book-card';
            card.dataset.id = book.id;

            card.innerHTML = `
              <div class="cover-box">
                <img src="${fixedCoverPath}" alt="Cover" loading="lazy">
              </div>
              <div class="details">
                <div class="title" title="${displayTitle}">${displayTitle}</div>
                <div class="meta">
                  <span class="format-badge">${book.format}</span>
                  <span>${book.filesizeMB} MB</span>
                </div>
              </div>
            `;
            grid.appendChild(card);
          });

          section.appendChild(grid);
          masterFragment.appendChild(section);
        });

        container.innerHTML = ''; // Clear out any loading placeholders safely
        container.appendChild(masterFragment);

        // --- Event Delegation Router ---
        container.addEventListener('click', (e) => {
          const card = e.target.closest('.book-card');
          if (!card) return;

          const targetId = card.dataset.id;
          const bookInfo = libraryBooks.find(b => b.id === targetId);

          if (bookInfo) {
            showDetails(bookInfo);
          }
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => {
          if (e.target === modal) modal.classList.remove('active');
        });

      } catch (err) {
        console.error("Error drawing components:", err);
        container.innerHTML = `<p>Failed to build display. Verify your <b>catalog.json</b> matches structural rules.</p>`;
      }
    }

    function showDetails(book) {
      const modal = document.getElementById('detail-modal');
      const cleanTitle = book.filename.replace(/\.[^/.]+$/, "");
      const normalizedCover = book.coverImage ? book.coverImage.replace(/\\/g, '/') : '';

      document.getElementById('modal-title').textContent = cleanTitle;
      document.getElementById('modal-img').src = normalizedCover ? `../${normalizedCover}` : `../covers/placeholder.jpg`;

      document.getElementById('info-id').textContent = book.id;
      document.getElementById('info-format').textContent = book.format.toUpperCase();
      document.getElementById('info-size').textContent = `${book.filesizeMB} MB (${book.filesize.toLocaleString()} bytes)`;
      document.getElementById('info-path').textContent = book.filepath.replace(/\\/g, '/');
      document.getElementById('info-created').textContent = new Date(book.createdAt).toLocaleDateString();
      document.getElementById('info-modified').textContent = new Date(book.modifiedAt).toLocaleDateString();
      document.getElementById('info-status').textContent = book.status;
      document.getElementById('info-notes').textContent = book.notes || "None";

      modal.classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', initGallery);
  </script>
</body>
</html>
