<!DOCTYPE html>
<html>

<head>
  <title>Large File Viewer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    .summary {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: #333;
      color: white;
      padding: 10px;
      text-align: left;
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      background: #555;
    }

    th:first-child {
      width: 450px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      vertical-align: top;
    }

    tr:hover {
      background: #f0f8ff;
    }

    .size {
      color: #c0392b;
      font-weight: bold;
      white-space: nowrap;
    }

    .path {
      color: #666;
      font-size: 13px;
    }
  </style>

</head>

<body>

  <h1>Large Files Report</h1>

  <div class="summary" id="summary">
    Loading...
  </div>

  <table>

    <thead>
      <tr>
        <th onclick="sortTable('name')">Name ▲▼</th>
        <th onclick="sortTable('sizeMB')">Size ▲▼</th>
        <th onclick="sortTable('extension')">Type ▲▼</th>
        <th onclick="sortTable('modified')">Modified ▲▼</th>
        <th onclick="sortTable('folderPath')">Folder ▲▼</th>
      </tr>
    </thead>

    <tbody id="fileList"></tbody>

  </table>

  <script>

    let fileData = [];

    let currentSortColumn = "";
    let ascending = true;


    async function loadFiles() {

      const response = await fetch("largeFiles.json");

      const data = await response.json();

      fileData = data.files;

      const info = data.scanInfo;

      document.getElementById("summary").innerHTML = `
                <b>Folder:</b> ${info.rootFolder}<br>
                <b>Minimum Size:</b> ${info.minimumFileSizeMB} MB<br>
                <b>Total Files Scanned:</b> ${info.totalFilesScanned.toLocaleString()}<br>
                <b>Large Files Found:</b> ${info.largeFilesFound.toLocaleString()}<br>
                <b>Scan Date:</b> ${new Date(info.scanDate).toLocaleString()}
            `;

      renderTable(fileData);

    }



    function renderTable(files) {

      const tbody = document.getElementById("fileList");

      tbody.innerHTML = "";

      files.forEach(file => {

        const row = document.createElement("tr");

        row.innerHTML = `
                    <td>${file.name}</td>

                    <td class="size">
                        ${file.sizeMB.toLocaleString()} MB
                    </td>

                    <td>${file.extension}</td>

                    <td>
                        ${new Date(file.modified).toLocaleString()}
                    </td>

                    <td class="path">
                        ${file.folderPath}
                    </td>
                `;

        tbody.appendChild(row);

      });

    }



    function sortTable(column) {

      if (currentSortColumn === column) {

        ascending = !ascending;

      } else {

        currentSortColumn = column;
        ascending = true;

      }


      fileData.sort((a, b) => {

        let x = a[column];
        let y = b[column];

        if (column === "modified") {

          x = new Date(x);
          y = new Date(y);

        }

        if (typeof x === "string") {

          x = x.toLowerCase();
          y = y.toLowerCase();

        }

        if (x < y)
          return ascending ? -1 : 1;

        if (x > y)
          return ascending ? 1 : -1;

        return 0;

      });

      renderTable(fileData);

    }


    loadFiles();

  </script>

</body>

</html>
