    var isDOMReady = false;
function waitUntilDOMReady(callback) {
  if (isDOMReady) {
    callback();
    return;
  }
  var DOMReadyIntervalId = window.setInterval(function () {
    if (
      document.readyState == 'interactive' ||
      document.readyState == 'complete'
    ) {
      isDOMReady = true;
      // Clear the interval id
      window.clearInterval(DOMReadyIntervalId);
      // Call a method once DOM ready.
      callback();
    }
  }, 10);
}

var areModulesAvailable = false;
function waitUntilModulesAvailable(callback) {
  if (areModulesAvailable) {
    callback();
    return;
  }

  var moduleList = ['LitbInitializer'];
  var moduleIntervalId = window.setInterval(function () {
    var allAvailable = true;
    moduleList.forEach(function (module) {
      if (!window.hasOwnProperty(module)) {
        allAvailable = false;
      }
    });

    if (allAvailable) {
      areModulesAvailable = true;
      // Clear the interval id
      window.clearInterval(moduleIntervalId);
      // Call a method once all above dependencies are available
      callback();
    }
  }, 10);
}
